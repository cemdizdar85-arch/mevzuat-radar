# .github/workflows/soru-uret.yml — SORU FABRIKASI (UWorld modeli)
# Harita agirliklarina gore ozgun soru uretir; 5 kapidan gecenler
# soru-bankasi-onay.json'a (STAGING) yazilir. Orneklem onayi sonrasi
# yayin bankasina tasinir. Manuel tetik.
name: Soru Fabrikasi

on:
  schedule:
    - cron: "30 2 * * *"    # 05:30 TR — gunde 5 vardiya (Cem 23.07: "acilista az soru olursa ilerleyemeyiz")
    - cron: "30 6 * * *"    # 09:30 TR
    - cron: "30 9 * * *"    # 12:30 TR
    - cron: "30 13 * * *"   # 16:30 TR
    - cron: "30 16 * * *"   # 19:30 TR — banka doyunca (konu basi 10) kosular kendiliginden bos gecer, maliyet sifirlanir
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: soru-uret
  cancel-in-progress: false

jobs:
  uret:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ozgun soru uret (5 kapili)
        shell: pwsh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}   # kilitli havuz kok/doygunluk kontrolu
        run: ./motor/soru-uret.ps1
      - name: Staging bankayi kaydet
        run: |
          git config user.name "mevzuat-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add veri/soru-bankasi-onay.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Soru fabrikasi: yeni ozgun sorular (onay bekliyor) $(TZ=Europe/Istanbul date +%d.%m.%Y)"
          git pull --rebase origin main || true
          git push || true
