# .github/workflows/soru-uret.yml — SORU FABRIKASI (UWorld modeli)
# Harita agirliklarina gore ozgun soru uretir; 5 kapidan gecenler
# soru-bankasi-onay.json'a (STAGING) yazilir. Orneklem onayi sonrasi
# yayin bankasina tasinir. Manuel tetik.
name: Soru Fabrikasi

on:
  schedule:
    - cron: "17 */2 * * *"   # her cift UTC saatte :17 = gunde 12 vardiya (TR 01:17'den 23:17'ye 2 saat arayla).
                              # 23.07 Cem karari: acilis dolu bankayla, 1500 de az - kapasite katlandi.
                              # Dakika :17 BILEREK TENHA (tam saat cronlari GitHub yogunlugunda atlaniyor).
                              # Banka konu-derinlik hedeflerine doyunca kosular kendiliginden bos gecer, maliyet sifirlanir.
  workflow_dispatch:
  push:
    paths:
      - 'motor/soru-uret.ps1'   # 23.07: fabrika duzeltmesi pushlaninca kosu kendiliginden baslar (Cem'in tik atmasi gerekmesin)

permissions:
  contents: write

concurrency:
  group: soru-uret
  cancel-in-progress: false

jobs:
  uret:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ozgun soru uret (5 kapili)
        shell: pwsh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}   # kilitli havuz kok/doygunluk kontrolu
        run: ./motor/soru-uret.ps1
      - name: Staging bankayi kaydet
        run: |
          # 23.07 dersi (#4 sessiz kaybi): push yarisi kaybederse uretim COPE gidiyordu.
          # Yeni duzen: 3 deneme + yine olmazsa KIRMIZI kosu (sessiz kayip yasak).
          git config user.name "mevzuat-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          # 23.07 #7 dersi: ortak dosyada rebase cakismasi 29 dk uretimi yedi.
          # Fabrika artik kosu basina ESSIZ dosya birakir (veri/fabrika/uretim-*.json)
          # -> cakisma imkansiz. GM denetimi tuketilen dosyayi [veri-operasyonu] ile siler.
          git add -A veri/fabrika/ 2>/dev/null || true
          git add veri/soru-bankasi-onay.json 2>/dev/null || true
          if git diff --cached --quiet; then echo "Yeni soru yok."; exit 0; fi
          git commit -m "Soru fabrikasi: yeni ozgun sorular (onay bekliyor) $(TZ=Europe/Istanbul date +%d.%m.%Y)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && { echo "push OK (deneme $i)"; exit 0; }
            echo "push denemesi $i basarisiz, tekrar..."
            sleep 5
          done
          echo "HATA: 3 denemede pushlanamadi - uretim KAYBOLMASIN diye kosu kirmizi."
          exit 1
