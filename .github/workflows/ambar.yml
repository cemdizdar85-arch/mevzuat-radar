# .github/workflows/ambar.yml  —  Bilgi Ambarı yükleyici (#48)
# veri/ambar-kaynaklar.json manifestini Supabase 'dokumanlar' tablosuna senkronlar.
# net-cevap edge fonksiyonu buradan tam-metin (FTS) arayıp alıntıyla cevaplar.
# GEREKSİNİM (Cem GitHub secret ekleyecek): SUPABASE_SERVICE_KEY (zorunlu).
# Secret yoksa robot zarifçe atlar. HER GÜN çalışır (idempotent: değişmeyeni
# atlar, sadece değişeni yazar) + istediğinde elle tetikle.
name: Bilgi Ambarı Yükleyici

on:
  schedule:
    - cron: "30 6 * * *"    # HER GÜN 06:30 UTC = 09:30 Türkiye (RG/kart nöbetiyle aynı gün)
  workflow_dispatch:

jobs:
  ambar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ambar yukleyici
        shell: pwsh
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: ./motor/ambar-yukle.ps1
