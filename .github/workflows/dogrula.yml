# Bu dosyanin GitHub'daki yolu: .github/workflows/dogrula.yml
# DOGRULAMA KAPISI (Katman 1): HER push'ta yapisal denetci + nokta-kontrol kosar.
# Amac: yanlis/celisik veri ana dala girer girmez KIRMIZI X + Cem'e mail.
# (Onceden dogrulama yalniz robotun gunluk isinde vardi; elle push'lar denetimsizdi.)
name: Dogrulama Kapisi

on:
  push:
    branches: [ main ]     # SIR BEKCISI her push'ta calissin diye paths filtresi kaldirildi
  workflow_dispatch:

jobs:
  dogrula:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # diff-bekcisi HEAD~1 ile kiyas yapar

      - name: Sir bekcisi (anahtar sizinti taramasi — depo PUBLIC!)
        run: |
          # API anahtari / servis anahtari / uzun JWT desenleri tracked dosyalarda aranir.
          # sb_publishable_ anahtari kasten HARIC: o publishable'dir, sitede acik durur.
          desenler='sk-ant-[A-Za-z0-9_-]{20,}|service_role|re_[A-Za-z0-9]{20,}|eyJhbGciOi[A-Za-z0-9_-]{60,}\.[A-Za-z0-9_-]{60,}\.[A-Za-z0-9_-]{20,}|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{30,}'
          bulunan=$(git grep -I -nE "$desenler" -- . ':!*.md' ':!.github/workflows/dogrula.yml' || true)
          if [ -n "$bulunan" ]; then
            echo "SIR BEKCISI KIRMIZI — olasi anahtar sizintisi:"
            echo "$bulunan"
            exit 1
          fi
          echo "Sir bekcisi temiz."

      - name: Diff bekcisi (kazayla veri silme freni)
        shell: pwsh
        run: ./arac/diff-bekcisi.ps1

      - name: Yapisal denetci (imkansiz/celisik veri)
        shell: pwsh
        run: ./arac/yapisal-denetci.ps1

      - name: Nokta-kontrol (bilinen kod -> dogru cevap regresyonu)
        shell: pwsh
        run: ./arac/nokta-kontrol.ps1
