# .github/workflows/mevzuat.yml — GÜNLÜK KANUN AYNASI
# Cem: "günlük tazeleme lazım, RG günlük çıkıyor." Her gün her kanunun
# mevzuat.gov.tr KONSOLİDE (güncel) metnini çeker, hash'ler; DEĞİŞENİ (kanun
# güncellendi/madde iptal) yeniden yutup Supabase'e yükler + son_senkron damgası.
# Değişmeyeni atlar. Böylece EZBER değil, güncel kaynağın günlük aynası.
name: Günlük Kanun Aynası

on:
  schedule:
    - cron: "0 7 * * *"     # HER GÜN 07:00 UTC = 10:00 Türkiye (RG/konsolide sonrası)
  workflow_dispatch:

permissions:
  contents: write

# ES-ZAMANLI KOSU YASAK (16.07.2026 dersi): iki kosu yaristi, ikisi de yedek
# yoldan VUK 509'u yukledi -> 364 = 2x182 cift kayit. Kuyruga al, iptal etme.
concurrency:
  group: mevzuat-ayna
  cancel-in-progress: false

jobs:
  mevzuat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: pdftotext kur (poppler-utils)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils
      - name: Kanun PDF indir + metne dok
        run: |
          mkdir -p _txt
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36"
          # while read: JSON string degerlerindeki bosluklardan word-split olmaz (jq satir-satir)
          jq -c '.kanunlar[]' veri/mevzuat-kaynaklar.json | while read -r row; do
            slug=$(echo "$row" | jq -r '.slug')
            pid=$(echo "$row" | jq -r '.pdfId')
            # G7:/G9: onekleri = yonetmelik/teblig (GeneratePdf ucundan); digerleri kanun (MevzuatMetin)
            case "$pid" in
              G7:*) url="https://www.mevzuat.gov.tr/File/GeneratePdf?mevzuatNo=${pid#G7:}&mevzuatTur=KurumVeKurulusYonetmeligi&mevzuatTertip=5" ;;
              G9:*) url="https://www.mevzuat.gov.tr/File/GeneratePdf?mevzuatNo=${pid#G9:}&mevzuatTur=Teblig&mevzuatTertip=5" ;;
              *)    url="https://www.mevzuat.gov.tr/MevzuatMetin/$pid.pdf" ;;
            esac
            code=$(curl -s -L -o "_txt/$slug.pdf" -w "%{http_code}" -H "User-Agent: $UA" -H "Referer: https://www.mevzuat.gov.tr/" "$url" --max-time 240 || echo "000")
            if [ "$code" = "200" ]; then
              pdftotext -enc UTF-8 "_txt/$slug.pdf" "_txt/$slug.txt" && echo "OK $slug" || echo "PDFTOTEXT FAIL $slug"
            else
              echo "INDIRME HATASI $slug ($code) - atlandi"
            fi
          done
          echo "indirme adimi tamam: $(ls _txt/*.txt 2>/dev/null | wc -l) metin"
      - name: Yut + hash + yukle (degiseni)
        shell: pwsh
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
        run: ./motor/mevzuat-yut.ps1
      - name: Degisen madde-belgelerini commit et
        run: |
          git config user.name "mevzuat-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A veri/mevzuat/ veri/yeniden-dogrula.json || true
          if git diff --staged --quiet; then
            echo "Degisiklik yok - commit yok."
          else
            git commit -m "Günlük kanun aynası: değişen kanun(lar) yeniden yutuldu $(date -u +%Y-%m-%d)"
            git pull --rebase origin main || true
            git push || echo "UYARI: push olmadi (uzak dal ilerlemis olabilir) - veri Supabase'de guvende, sonraki kosu telafi eder."
          fi
      # GUVEN KATMANI C: hasat VE commit sonrasi retrieval sigortasi — altin
      # setteki her soru icin beklenen kaynak top-6'da bulunmali. Dusen vaka =
      # kirmizi kosu = GitHub e-postasi. Commit'ten SONRA kosar: kapinin isi
      # alarm vermek, hasat verisini rehin almak degil.
      - name: Ambar altin testi (retrieval kapisi)
        shell: pwsh
        run: ./motor/ambar-testi.ps1
      # Gunun 8 vakasi uctan uca (net-cevap + Haiku hakem, 0-10 puan). Anahtar
      # tanimli degilse script kendini atlar; retrieval kapisi yine de kosuyor.
      - name: Cevap hakemi (gunluk orneklem)
        shell: pwsh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./motor/cevap-hakemi.ps1
