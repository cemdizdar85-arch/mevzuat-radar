# Bu dosyanin GitHub'daki yolu: .github/workflows/kaynak.yml
# Kaynak Nobetcisi: resmi kaynaklari haftalik izler; degisince Cem'e mail atar
# ve (deterministik olanlari) yeniden hasat edip commit'ler.
name: Kaynak Nobetcisi

on:
  schedule:
    - cron: "0 6 * * *"     # HER GUN 06:00 UTC = 09:00 Turkiye
  workflow_dispatch:        # elle de calistirilabilir

permissions:
  contents: write

jobs:
  nobet:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: pdftotext kur (gecikme zammi PDF parse icin)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Kaynak nobetcisini calistir
        shell: pwsh
        run: ./arac/kaynak-nobetcisi.ps1

      - name: Yurt ici ihale listesi (ilan.gov.tr acik API — gunluk yenile)
        shell: pwsh
        run: ./motor/ihale-yurtici-hasat.ps1 -Adet 40

      - name: Yapisal denetci (imkansiz/celisik veri — patlarsa commit YOK)
        shell: pwsh
        run: ./arac/yapisal-denetci.ps1

      - name: Nokta-kontrol (regresyon testi — patlarsa commit YOK)
        shell: pwsh
        run: ./arac/nokta-kontrol.ps1

      - name: Degisiklik varsa yayinla
        run: |
          git config user.name "mevzuat-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add veri/.kaynak-hash.json veri/*.json
          git diff --cached --quiet || git commit -m "Kaynak nobetcisi: kaynak/veri guncellendi ($(date +%d.%m.%Y))"
          git push
