# .github/workflows/paket.yml — PAKET HAVUZU TAŞIYICI (elle tetiklenir)
# Onay dosyasındaki durum='paket-havuzu' soruları Supabase kilitli tabloya
# (soru_havuzu; yalnız üye okur) taşır ve public depodan siler.
# ÖN KOŞUL: radar-app/sql/2026-07-23-soru-havuzu.sql bir kez SQL Editor'de
# çalıştırılmış olmalı. Commit mesajındaki [veri-operasyonu] bileti, diff
# bekçisinin "kayıt kayboldu" alarmını bilinçli taşımada susturur.
name: Paket Havuzu Tasiyici

on:
  workflow_dispatch:
  push:
    paths:
      - 'veri/soru-bankasi-onay.json'   # 23.07: GM onay push'unda kendiliginden tasir.
      - 'veri/fabrika/**'               # el partisi / fabrika kanali da ayni kapidan tasinir
      # NOT: robot commit'leri GITHUB_TOKEN ile pushlanir ve workflow TETIKLEMEZ;
      # bu tetik yalniz yerel (GM/Cem) push'larinda calisir - dongu/masraf riski yok.

permissions:
  contents: write

concurrency:
  group: paket-tasiyici
  cancel-in-progress: false

jobs:
  tasi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Paket sorularini kilitli havuza tasi
        shell: pwsh
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: ./motor/paket-yukle.ps1
      - name: Depo temizligini kaydet
        run: |
          git config user.name "mevzuat-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add veri/soru-bankasi-onay.json 2>/dev/null || true
          git add -A veri/fabrika/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Degisiklik yok."
          else
            git commit -m "Paket sorulari kilitli havuza tasindi [veri-operasyonu]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && { echo "push OK (deneme $i)"; exit 0; }
              echo "push denemesi $i basarisiz, tekrar..."
              sleep 5
            done
            echo "HATA: 3 denemede pushlanamadi - kosu kirmizi (sessiz kayip yasak)."
            exit 1
          fi
